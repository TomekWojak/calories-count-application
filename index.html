<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./dist/output.css">
    <script type="module" src="./dist/script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body class="font-main bg-[#120E16]">
    <div class="app-ceiling grid place-items-center h-[15vh] bg-(--accent) rounded-b-full">
        <h1 class="text-white text-xl">Aplikacja kaloryczna</h1>
    </div>
    <div class="app-stats mt-5 flex gap-2 p-2 text-white">
        <div
            class="app-stat p-2 text-center flex flex-col gap-1 grow items-center rounded-2xl border border-[#9EFB14] shadow-[0px_0px_5px_0px_#9ffb14a3] font-semibold">
            <p class="text-xl">🍗</p>
            <p>Białko</p>
            <p class="w-full h-2 rounded-full bg-[#E2E8F0]"><span
                    class="block relative h-full w-[70%] z-0 progress-bar rounded-full protein-progress-bar bg-[#9EFB14] before:content-[''] before:inset-0 before:bg-[#9EFB14] before:absolute before:-z-1 before:rounded-[inherit] before:blur-sm before:opacity-35"></span>
            </p>
            <p class="app-stat-results"><span class="current">145g</span> / <span class="target">200g</span></p>
        </div>
        <div
            class="app-stat p-2 text-center flex flex-col gap-1 grow items-center rounded-2xl border border-[#9EFB14] shadow-[0px_0px_5px_0px_#9ffb14a3] font-semibold">
            <p class="text-xl">🔥</p>
            <p>Kalorie</p>
            <p class="w-full h-2 rounded-full bg-[#E2E8F0]"><span
                    class="block relative h-full w-1/2 z-0 progress-bar rounded-full protein-progress-bar bg-[#9EFB14] before:content-[''] before:inset-0 before:bg-[#9EFB14] before:absolute before:-z-1 before:rounded-[inherit] before:blur-sm before:opacity-35"></span>
            </p>
            <p class="app-stat-results"><span class="current">750kcal</span> / <span class="target">2500kcal</span></p>
        </div>
        <div
            class="app-stat p-2 text-center flex flex-col gap-1 grow items-center rounded-2xl border border-[#9EFB14] shadow-[0px_0px_5px_0px_#9ffb14a3] font-semibold">
            <p class="text-xl">🥑</p>
            <p>Tłuszcze</p>
            <p class="w-full h-2 rounded-full bg-[#E2E8F0]"><span
                    class="block relative h-full w-[70%] z-0 progress-bar rounded-full protein-progress-bar bg-[#9EFB14] before:content-[''] before:inset-0 before:bg-[#9EFB14] before:absolute before:-z-1 before:rounded-[inherit] before:blur-sm before:opacity-35"></span>
            </p>
            <p class="app-stat-results"><span class="current">145g</span> / <span class="target">200g</span></p>
        </div>
    </div>
    <div class="main-content p-2">
        <div class="main-content-panel mt-5 flex items-start gap-2">
            <div class="custom-select w-full relative">
                <div class="custom-select-input-box relative">
                    <input type="text" readonly value="Wybierz produkt"
                        class="p-2 py-3 text-[#120E16] block w-full select-none bg-[#9EFB14] rounded-lg border focus-visible:outline-0 transition-colors cursor-pointer">
                    <img src="./src/img/chevron-down.svg" alt="" #9EFB14
                        class="custom-select-arrow absolute top-1/2 right-2 -translate-y-1/2 pointer-events-none transition-transform">
                </div>
                <div
                    class="custom-select-panel absolute left-0 -bottom-2 translate-y-full bg-[#120E16] hidden py-2 px-2 mt-2 border border-[#9EFB14] rounded-lg text-white">
                    <div class="custom-select-search-engine relative">
                        <input type="text" placeholder="Szukaj..."
                            class="block w-full px-8 focus:outline-0 caret-white">
                        <img src="./src/img/search.svg" alt=""
                            class="absolute w-5 left-0 top-1/2 -translate-y-1/2 pointer-events-none">
                    </div>
                    <hr class="border-[#9EFB14]/30 my-3">
                    <ul class="custom-select-panel-body max-h-35 overflow-y-auto">
                        <li class="custom-select-food py-3 px-2 hover:bg-[#333]/20 transition-colors rounded-lg cursor-pointer focus-visible:bg-[#333]/20 focus-visible:outline-0"
                            role="option" tabindex="0">
                            Jajko</li>
                        <li class="custom-select-food py-3 px-2 hover:bg-[#333]/20 transition-colors rounded-lg cursor-pointer focus-visible:bg-[#333]/20 focus-visible:outline-0"
                            role="option" tabindex="0">
                            Ananas</li>
                        <li class="custom-select-food py-3 px-2 hover:bg-[#333]/20 transition-colors rounded-lg cursor-pointer focus-visible:bg-[#333]/20 focus-visible:outline-0"
                            role="option" tabindex="0">
                            Masło</li>
                        <li class="custom-select-food py-3 px-2 hover:bg-[#333]/20 transition-colors rounded-lg cursor-pointer focus-visible:bg-[#333]/20 focus-visible:outline-0"
                            role="option" tabindex="0">
                            Masło</li>
                        <li class="custom-select-food py-3 px-2 hover:bg-[#333]/20 transition-colors rounded-lg cursor-pointer focus-visible:bg-[#333]/20 focus-visible:outline-0"
                            role="option" tabindex="0">
                            Masło</li>
                    </ul>
                </div>
            </div>
            <div class="quantity-box w-[40%]">
                <input type="number"
                    class="block w-full quantity text-white px-2 py-3 border border-[#9EFB14] rounded-lg focus-visible:outline-0 transition-colors bg-[#2424248e]"
                    placeholder="Ilość">
            </div>
        </div>
        <button
            class="text-center py-3 mt-3 px-6 bg-(--accent) w-full rounded-lg text-white font-semibold cursor-pointer">Dodaj</button>
    </div>
</body>

</html>
