<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./dist/output.css">
    <script type="module" src="./dist/script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body class="font-main bg-[#120E16]">
    <div class="app-ceiling grid place-items-center h-[15vh] bg-(--accent) rounded-b-full">
        <h1 class="text-white text-xl">Aplikacja kaloryczna</h1>
    </div>
    <div class="app-stats mt-5 flex gap-2 p-2 text-white">
        <div
            class="app-stat relative p-2 text-center flex flex-col gap-1 grow items-center rounded-2xl border border-[#9EFB14] shadow-[0px_0px_5px_0px_#9ffb1438] font-semibold">
            <img class="finished-icon hidden absolute w-3.5 left-2 top-2" src="./src/img/check-square.svg" alt="">
            <p class="text-xl">🍗</p>
            <p>Białko</p>
            <p class="w-full progress-bar-box h-2 rounded-full bg-[#E2E8F0]"><span
                    class="block relative h-full max-w-full w-0 z-0 progress-bar rounded-full protein-progress-bar bg-[#9EFB14] before:content-[''] before:inset-0 before:bg-[#9EFB14] before:absolute before:-z-1 before:rounded-[inherit] before:blur-sm before:opacity-35 transition-[width_0.6s_ease]"></span>

            </p>
            <p class="app-stat-results"><span class="current current-protein">0</span>g / <span
                    class="target target-protein">122</span>g</p>
        </div>
        <div
            class="app-stat relative p-2 text-center flex flex-col gap-1 grow items-center rounded-2xl border border-[#9EFB14] shadow-[0px_0px_5px_0px_#9ffb1438] font-semibold">
            <img class="finished-icon hidden absolute w-3.5 left-2 top-2" src="./src/img/check-square.svg" alt="">
            <p class="text-xl">🔥</p>
            <p>Kalorie</p>
            <p class="progress-bar-box w-full h-2 rounded-full bg-[#E2E8F0]"><span
                    class="block relative h-full max-w-full z-0 w-0 progress-bar rounded-full protein-progress-bar bg-[#9EFB14] before:content-[''] before:inset-0 before:bg-[#9EFB14] before:absolute before:-z-1 before:rounded-[inherit] before:blur-sm before:opacity-35 transition-[width_0.6s_ease]"></span>
            </p>
            <p class="app-stat-results"><span class="current current-calories">0</span>kcal / <span
                    class="target target-calories">2594</span>kcal</p>
        </div>
        <div
            class="app-stat relative p-2 text-center flex flex-col gap-1 grow items-center rounded-2xl border border-[#9EFB14] shadow-[0px_0px_5px_0px_#9ffb1438] font-semibold">
            <img class="finished-icon hidden absolute w-3.5 left-2 top-2" src="./src/img/check-square.svg" alt="">
            <p class="text-xl">🥑</p>
            <p>Tłuszcze</p>
            <p class="w-full h-2 progress-bar-box rounded-full bg-[#E2E8F0]"><span
                    class="block relative h-full max-w-full z-0 progress-bar w-0 rounded-full protein-progress-bar bg-[#9EFB14] before:content-[''] before:inset-0 before:bg-[#9EFB14] before:absolute before:-z-1 before:rounded-[inherit] before:blur-sm before:opacity-35 transition-[width_0.6s_ease]"></span>
            </p>
            <p class="app-stat-results"><span class="current current-fats">0</span>g / <span
                    class="target target-fats">61</span>g
            </p>
        </div>
    </div>
    <div class="main-content p-2">
        <div class="main-content-panel mt-5 flex items-start gap-2">
            <div class="custom-select w-full relative">
                <div class="custom-select-input-box relative">
                    <input type="text" readonly value="Wybierz produkt"
                        class="p-2 py-3 text-[#120E16] block w-full select-none bg-[#9EFB14] rounded-lg border focus-visible:outline-0 transition-colors cursor-pointer">
                    <img src="./src/img/chevron-down.svg" alt="" #9EFB14
                        class="custom-select-arrow absolute top-1/2 right-2 -translate-y-1/2 pointer-events-none transition-transform">
                </div>
                <div
                    class="custom-select-panel absolute left-0 -bottom-2 translate-y-full bg-[#120E16] hidden py-2 px-2 mt-2 border border-[#9EFB14] rounded-lg text-white">
                    <div class="custom-select-search-engine relative">
                        <input type="text" placeholder="Szukaj..."
                            class="block w-full px-8 focus:outline-0 caret-white">
                        <img src="./src/img/search.svg" alt=""
                            class="absolute w-5 left-0 top-1/2 -translate-y-1/2 pointer-events-none">
                    </div>
                    <hr class="border-[#9EFB14]/30 my-3">
                    <ul class="custom-select-panel-body max-h-35 overflow-y-auto">
                        <li class="empty-info hidden text-center">Brak wyników</li>
                    </ul>
                </div>
            </div>
            <div class="quantity-box w-[40%]">
                <input type="number"
                    class="block w-full quantity text-white px-2 py-3 border border-[#9EFB14] rounded-lg focus-visible:outline-0 transition-colors bg-[#2424248e]"
                    placeholder="Ilość">
            </div>
        </div>
        <!-- <div class="own-calories-box">
            <input type="text" class="own-calories-input text-white" placeholder="Kcal">
        </div> -->
        <button
            class="calculate-btn text-center py-3 mt-3 px-6 bg-(--accent) w-full rounded-lg text-white font-semibold cursor-pointer">Dodaj</button>
        <div class="history-box py-6 text-white">
            <h2 class="text-center">Ostatnie produkty</h2>
            <ul class="history flex flex-col gap-2 mt-6 max-h-70 overflow-y-auto">

            </ul>
        </div>
        <button class="clear-storage text-[#120E16] bg-[#9EFB14] p-2 mt-2 rounded-xl cursor-pointer">Wyczyść</button>
    </div>
</body>

</html>
